<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 175" width="590" height="175">
  <title>ORAXIA — Oracle AI Skills Platform</title>
  <desc>Logo for ORAXIA, an open-source collection of AI skill definitions for Oracle Database and APEX development, supporting all major AI coding platforms.</desc>
  <defs>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E05C3A"/><stop offset="100%" stop-color="#B03020"/>
    </linearGradient>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C2233"/><stop offset="100%" stop-color="#0D1321"/>
    </linearGradient>
    <filter id="gf" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .bolt{animation:ba 2s ease-in-out infinite}
    @keyframes ba{0%,100%{opacity:.9}50%{opacity:1;filter:drop-shadow(0 0 6px rgba(255,230,100,.9))}}
    .hr{animation:ha 4s ease-in-out infinite}
    @keyframes ha{0%,100%{stroke:rgba(255,255,255,.2)}50%{stroke:rgba(255,220,160,.6)}}
    .s1{animation:sa 2.5s 0s ease-in-out infinite}
    .s2{animation:sa 2.5s .65s ease-in-out infinite}
    @keyframes sa{0%,100%{stroke-opacity:.4}50%{stroke-opacity:1}}
    .pb rect{transition:filter .2s,transform .2s;cursor:pointer}
    .pb:hover rect{filter:brightness(1.35)}
    .pb:hover text{font-weight:700}
    .pb1{animation:bp 4s 0s ease-in-out infinite}
    .pb2{animation:bp 4s .57s ease-in-out infinite}
    .pb3{animation:bp 4s 1.14s ease-in-out infinite}
    .pb4{animation:bp 4s 1.71s ease-in-out infinite}
    .pb5{animation:bp 4s 2.28s ease-in-out infinite}
    .pb6{animation:bp 4s 2.85s ease-in-out infinite}
    .pb7{animation:bp 4s 3.43s ease-in-out infinite}
    @keyframes bp{0%,40%,100%{opacity:.72}20%{opacity:1}}
    .ob{animation:op 3.5s ease-in-out infinite}
    @keyframes op{0%,100%{opacity:.8}50%{opacity:1}}
  </style>

  <!-- HEXAGON MARK -->
  <polygon points="90,10 150,10 180,60 150,110 90,110 60,60" fill="url(#rg)"/>

  <!-- Animated inner ring -->
  <polygon class="hr" points="90,18 148,18 172,60 148,102 90,102 66,60"
    fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values=".2;.6;.2" dur="4s" repeatCount="indefinite"/>
  </polygon>

  <!-- Database cylinder -->
  <ellipse cx="120" cy="40" rx="28" ry="8" fill="rgba(255,255,255,.9)"/>
  <rect x="92" y="40" width="56" height="32" fill="rgba(255,255,255,.75)"/>
  <ellipse cx="120" cy="72" rx="28" ry="8" fill="rgba(255,255,255,.9)"/>

  <!-- Animated data stripes -->
  <ellipse class="s1" cx="120" cy="51" rx="28" ry="8" fill="none" stroke="#C74634" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values=".4;1;.4" dur="2.5s" begin="0s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse class="s2" cx="120" cy="62" rx="28" ry="8" fill="none" stroke="#C74634" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values=".4;1;.4" dur="2.5s" begin=".65s" repeatCount="indefinite"/>
  </ellipse>

  <!-- AI lightning bolt with glow -->
  <polygon class="bolt" filter="url(#gf)"
    points="125,14 117,28 122,28 115,42 129,24 123,24" fill="white">
    <animate attributeName="opacity" values=".9;1;.9" dur="2s" repeatCount="indefinite"/>
  </polygon>

  <!-- ORAXIA WORDMARK -->
  <text x="207" y="70" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="52" font-weight="700" letter-spacing="3" fill="url(#dg)">ORAXIA</text>

  <!-- Tagline -->
  <text x="209" y="96" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="13" letter-spacing="4.5" fill="#C74634">ORACLE AI SKILLS PLATFORM</text>

  <!-- Divider -->
  <line x1="207" y1="108" x2="575" y2="108" stroke="#C74634" stroke-width="1" opacity=".35"/>

  <!-- MIT OPEN SOURCE badge -->
  <g class="ob" transform="translate(207,118)">
    <rect rx="4" width="52" height="17" fill="#1a7f37"/>
    <text x="26" y="12" font-family="'Segoe UI',Arial,sans-serif" font-size="9"
      font-weight="700" fill="white" text-anchor="middle" letter-spacing=".5">MIT OPEN</text>
  </g>

  <!-- Platform badges — Row 1 -->
  <g class="pb pb1" transform="translate(265,118)">
    <rect rx="4" width="70" height="17" fill="#C2410C"/>
    <text x="35" y="12" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5"
      font-weight="600" fill="white" text-anchor="middle">Claude Code</text>
  </g>
  <g class="pb pb2" transform="translate(341,118)">
    <rect rx="4" width="45" height="17" fill="#2563EB"/>
    <text x="22" y="12" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5"
      font-weight="600" fill="white" text-anchor="middle">Cursor</text>
  </g>
  <g class="pb pb3" transform="translate(392,118)">
    <rect rx="4" width="52" height="17" fill="#24292F"/>
    <text x="26" y="12" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5"
      font-weight="600" fill="white" text-anchor="middle">Copilot</text>
  </g>
  <g class="pb pb4" transform="translate(450,118)">
    <rect rx="4" width="47" height="17" fill="#0078D4"/>
    <text x="23" y="12" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5"
      font-weight="600" fill="white" text-anchor="middle">VS Code</text>
  </g>
  <g class="pb pb5" transform="translate(503,118)">
    <rect rx="4" width="54" height="17" fill="#7C3AED"/>
    <text x="27" y="12" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5"
      font-weight="600" fill="white" text-anchor="middle">Windsurf</text>
  </g>

  <!-- Platform badges — Row 2 -->
  <g class="pb pb6" transform="translate(207,141)">
    <rect rx="4" width="70" height="17" fill="#059669"/>
    <text x="35" y="12" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5"
      font-weight="600" fill="white" text-anchor="middle">Continue.dev</text>
  </g>
  <g class="pb pb7" transform="translate(283,141)">
    <rect rx="4" width="58" height="17" fill="#0284C7"/>
    <text x="29" y="12" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5"
      font-weight="600" fill="white" text-anchor="middle">OpenCode</text>
  </g>
  <text x="348" y="153" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5"
    fill="#888" letter-spacing=".5">+ any AI platform</text>
</svg>
